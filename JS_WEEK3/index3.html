<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> My first project USING DOM </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <H1> My personal Notes</H1>
    <p> Type a note below and click "add" to save it</p>

    <!-- simple form container for user input-->
    <div class="input-container">
        <input type="text" id="noteInput" placeholder="type your note here...">
        <button id="addBtn"> Add</button>
    </div>

    <!-- Dynamic list where notes will be rendered-->
    <ul id="notesList"></ul>

    <script src="manipulatingDOM.js"></script>
    
</body>
</html>
